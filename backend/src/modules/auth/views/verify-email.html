<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <meta name="robots" content="noindex, nofollow" />
    <title>Verify Email · Belvix</title>
    <style>
      :root {
        --blue: #005080;
        --green: #00916e;
        --ink: #0f172a;
        --muted: #64748b;
        --danger: #ef4444;
        --ok: #10b981;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        color: var(--ink);
        min-height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: linear-gradient(135deg, #0a3d62 0%, #005080 45%, #00916e 100%);
        background-attachment: fixed;
        position: relative;
        overflow-x: hidden;
      }

      /* Soft decorative blobs behind the card. */
      body::before,
      body::after {
        content: "";
        position: fixed;
        border-radius: 50%;
        filter: blur(70px);
        opacity: 0.5;
        z-index: 0;
      }
      body::before {
        width: 320px;
        height: 320px;
        background: #2dd4bf;
        top: -90px;
        right: -60px;
      }
      body::after {
        width: 360px;
        height: 360px;
        background: #1d4ed8;
        bottom: -120px;
        left: -80px;
      }

      .card {
        position: relative;
        z-index: 1;
        width: 100%;
        max-width: 440px;
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(18px) saturate(160%);
        -webkit-backdrop-filter: blur(18px) saturate(160%);
        border: 1px solid rgba(255, 255, 255, 0.6);
        border-radius: 26px;
        box-shadow: 0 30px 60px -20px rgba(2, 32, 56, 0.55);
        padding: 34px 28px 26px;
        text-align: center;
        animation: rise 0.5s ease both;
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .brand {
        display: flex;
        flex-direction: column;
        align-items: center;
        margin-bottom: 18px;
      }
      .logo {
        width: 64px;
        height: 64px;
        border-radius: 18px;
        background: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 10px 24px -10px rgba(2, 32, 56, 0.45);
        margin-bottom: 14px;
      }
      .logo svg {
        width: 42px;
        height: 42px;
        display: block;
      }
      .brand h1 {
        font-size: 21px;
        font-weight: 800;
        letter-spacing: -0.2px;
      }

      .badge {
        width: 84px;
        height: 84px;
        margin: 8px auto 18px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .badge.ok {
        background: rgba(16, 185, 129, 0.12);
      }
      .badge.err {
        background: rgba(239, 68, 68, 0.12);
      }
      .badge svg {
        width: 46px;
        height: 46px;
      }
      .badge.ok svg {
        stroke: var(--ok);
      }
      .badge.err svg {
        stroke: var(--danger);
      }
      /* Animated check draw on success */
      .badge.ok .draw {
        stroke-dasharray: 48;
        stroke-dashoffset: 48;
        animation: draw 0.5s ease forwards 0.2s;
      }
      @keyframes draw {
        to {
          stroke-dashoffset: 0;
        }
      }

      h2 {
        font-size: 21px;
        font-weight: 800;
      }
      p {
        margin-top: 10px;
        font-size: 14px;
        color: var(--muted);
        line-height: 1.5;
      }

      .hint {
        margin-top: 22px;
        padding: 13px 16px;
        border-radius: 14px;
        background: rgba(0, 80, 128, 0.07);
        border: 1px solid rgba(0, 80, 128, 0.12);
        font-size: 13px;
        font-weight: 600;
        color: var(--blue);
        line-height: 1.45;
      }
      .badge.err ~ .hint {
        background: rgba(239, 68, 68, 0.08);
        border-color: rgba(239, 68, 68, 0.2);
        color: #b42318;
      }

      .footer {
        margin-top: 22px;
        font-size: 11.5px;
        color: var(--muted);
      }

      /* Server picks the state via the body[data-state] attribute. */
      .state {
        display: none;
      }
      body[data-state="success"] #successState {
        display: block;
      }
      body[data-state="error"] #errorState {
        display: block;
      }

      @media (max-width: 420px) {
        .card {
          padding: 28px 20px 22px;
          border-radius: 22px;
        }
      }
    </style>
  </head>
  <body data-state="{{STATE}}">
    <main class="card" role="main">
      <div class="brand">
        <div class="logo" aria-hidden="true">
          <!-- Belvix mark -->
          <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M18.8766 43.706C23.8556 38.5361 24.5687 24.6396 15.4567 18.4768C14.864 18.0759 14.1598 17.8981 13.4511 17.8981H7.57335C6.97062 17.8981 6.34748 17.9577 5.83437 18.284C5.35813 18.5868 5.10106 18.9711 4.91805 19.5719C4.82566 19.8753 4.7991 20.1951 4.7991 20.513V29.9049C4.7991 30.445 4.82835 30.9929 5.01104 31.499C5.33542 32.3976 5.86485 32.7914 6.94818 33.0083C7.1705 33.0528 7.39778 33.0674 7.62425 33.0674H16.1886V42.3863C16.1886 42.8662 16.215 43.3746 16.5114 43.7445C16.5634 43.8094 16.6189 43.8701 16.6767 43.9267C17.298 44.536 18.2724 44.3333 18.8766 43.706Z"
              fill="#005080"
            />
            <path
              d="M29.1308 43.706C24.1517 38.5361 23.4387 24.6396 32.5507 18.4768C33.1434 18.0759 33.8476 17.8981 34.5563 17.8981H40.434C41.0368 17.8981 41.6599 17.9577 42.173 18.284C42.6493 18.5868 42.9063 18.9711 43.0893 19.5719C43.1817 19.8753 43.2083 20.1951 43.2083 20.513V29.9049C43.2083 30.445 43.179 30.9929 42.9963 31.499C42.672 32.3976 42.1425 32.7914 41.0592 33.0083C40.8369 33.0528 40.6096 33.0674 40.3831 33.0674H31.8188V42.3863C31.8188 42.8662 31.7924 43.3746 31.496 43.7445C31.444 43.8094 31.3885 43.8701 31.3307 43.9267C30.7094 44.536 29.7349 44.3333 29.1308 43.706Z"
              fill="#005080"
            />
            <path
              d="M20.0075 18.2141C18.7265 17.0104 17.8115 16.2882 15.9815 15.566V6.57448C15.9815 5.15851 17.094 4.01064 18.4665 4.01064H29.2347C30.6071 4.01064 31.7197 5.15851 31.7197 6.57448V15.566C29.8896 16.2882 28.9746 17.0104 27.6936 18.2141C26.6148 19.2277 24.7041 20.5129 24.1855 20.9693C24.0863 21.0566 23.9699 21.1029 23.8506 21.1029C23.7312 21.1029 23.6148 21.0566 23.5157 20.9693C22.9971 20.5129 21.0863 19.2277 20.0075 18.2141Z"
              fill="#00916E"
            />
            <path
              d="M27.1639 13.625C27.1639 15.395 25.7732 16.8298 24.0576 16.8298C22.3421 16.8298 20.9514 15.395 20.9514 13.625C20.9514 11.8551 22.3421 10.4202 24.0576 10.4202C25.7732 10.4202 27.1639 11.8551 27.1639 13.625Z"
              fill="#fff"
            />
          </svg>
        </div>
        <h1>Belvix</h1>
      </div>

      <!-- SUCCESS STATE -->
      <section class="state" id="successState">
        <div class="badge ok">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2.4"
            stroke-linecap="round" stroke-linejoin="round">
            <path class="draw" d="M20 6 9 17l-5-5" />
          </svg>
        </div>
        <h2>Email verified</h2>
        <p>
          Your email address has been verified successfully. You're all set.
        </p>
        <div class="hint">Open the Belvix app and sign in to continue.</div>
      </section>

      <!-- ERROR STATE (invalid / expired token) -->
      <section class="state" id="errorState">
        <div class="badge err">
          <svg viewBox="0 0 24 24" fill="none" stroke-width="2.4"
            stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="9" />
            <path d="M12 7v6" />
            <path d="M12 16.5v.5" />
          </svg>
        </div>
        <h2>Verification failed</h2>
        <p id="errorText">{{ERROR_MESSAGE}}</p>
        <div class="hint">
          Open the Belvix app to request a new verification email and try again.
        </div>
      </section>

      <div class="footer">© Belvix · Secure email verification</div>
    </main>
  </body>
</html>
